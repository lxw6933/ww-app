app:
  # 单实例允许同时承载的实时日志流上限。
  # 每个被订阅的实例日志会占用 1 条流，例如“全部服务”订阅会按命中的实例数累加占用。
  maxConcurrentStreams: 96
  # nginx 目标配置说明：
  # 1. 使用 targetType: nginx 声明当前目标不是 JVM 应用；
  # 2. logPath 指向 nginx 日志目录，前端仍可列出并查看 access/error 日志；
  # 3. 不配置 manageCommandFile，前端会自动隐藏 JVM 与实例运维能力。
  # 推荐结构：app.projects.<project>.<env>.<service>。
  # 兼容说明：若仍使用 app.servers，系统会自动归并到 default 项目。
  projects:
    mall:
      # 多实例服务命名约定：
      # 同一环境下若一个服务有多个实例，可使用 "服务名@实例标识" 作为 key。
      # 例如：mall-basic@node1、mall-basic@node2。
      # 前端会按 "服务名" 聚合展示与订阅。
      test:
        mall-basic-portal:
          host: ${test.ip}
          port: ${test.port}
          username: ${test.username}
          password: ${test.password}
          # privateKeyPath: "/home/dev/.ssh/id_rsa"
          # privateKeyPassphrase: ""
          # preferredAuthentications: "publickey,password,keyboard-interactive"
          # connectTimeoutMs: 8000
          logPath: ${service.mall-basic-portal.logPath}
          manageCommandFile: ${service.mall-basic-portal.manageCommandFile}
        mall-basic-service:
          host: ${test.ip}
          port: ${test.port}
          username: ${test.username}
          password: ${test.password}
          logPath: ${service.mall-basic-service.logPath}
          manageCommandFile: ${service.mall-basic-service.manageCommandFile}
        mall-auth-service:
          host: ${test.ip}
          port: ${test.port}
          username: ${test.username}
          password: ${test.password}
          logPath: ${service.mall-auth-service.logPath}
          manageCommandFile: ${service.mall-auth-service.manageCommandFile}
        mall-ext-service:
          host: ${test.ip}
          port: ${test.port}
          username: ${test.username}
          password: ${test.password}
          logPath: ${service.mall-ext-service.logPath}
          manageCommandFile: ${service.mall-ext-service.manageCommandFile}
        soul-bootstrap:
          host: ${test.ip}
          port: ${test.port}
          username: ${test.username}
          password: ${test.password}
          logPath: ${service.soul-bootstrap.logPath}
          manageCommandFile: ${service.soul-bootstrap.manageCommandFile}
        nginx:
          host: ${test.ip}
          port: ${test.port}
          username: ${test.username}
          password: ${test.password}
          targetType: nginx
          logPath: ${service.nginx.logPath}

      test2:
