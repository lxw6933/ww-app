server:
  port: 9001  #服务端口号
  servlet:
    context-path: /mall-coupon
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://192.168.10.141:3306/mall_basic?characterEncoding=UTF-8&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    url: jdbc:mysql://localhost:3306/ww_mall?characterEncoding=UTF-8&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: admin
#    password: adminlxw
  redis:
    host: localhost
    password: 123456
    port: 6379
  data:
    mongodb:
      # 副本集群配置
#      uri: mongodb://ww:admin@172.28.174.84:27001,172.28.174.84:27002,172.28.174.84:27003/ww_mall?replicaSet=rs&readPreference=secondaryPreferred&connectTimeoutMS=300000
      # 单机配置
      host: localhost:27017
      database: ww_mall
      username: admin
      password: admin
      authentication-database: admin
  rabbitmq:
    addresses: localhost:5672
    virtual-host: /
    # 设置发送端到exchange确认回调
    publisher-confirm-type: correlated
    # 设置发送端到queue确认回调
    publisher-returns: true
    # 设置消息抵达queue，以异步方式回调 publisher-returns
    template:
      mandatory: true

# 开启sentinel feign支持【调用方（调用服务方）的熔断保护、被调用方（服务提供方）的降级保护】
feign:
  sentinel:
    enabled: true

ip2region:
  enabled: true

mybatis-plus:
  mapper-locations: classpath:mapper/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      id-type: auto