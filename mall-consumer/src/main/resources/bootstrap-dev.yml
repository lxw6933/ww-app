server:
  port: 7700  #服务端口号
spring:
  redis:
    host: localhost
    password: 123456
  data:
    mongodb:
      host: localhost:27017
      database: ww_mall
      username: admin
      password: admin
      authentication-database: admin
  rabbitmq:
    addresses: localhost:5672
    virtual-host: /
    listener:
      simple:
        # 手动ack消息
        acknowledge-mode: manual
        # 每次最多消费10条消息
        prefetch: 10
        # 开启20个线程来处理
        concurrency: 20

# 开启sentinel feign支持【调用方（调用服务方）的熔断保护、被调用方（服务提供方）的降级保护】
feign:
  sentinel:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"