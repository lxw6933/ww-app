server:
  port: 8800  #服务端口号
  servlet:
    context-path: /mall-search
spring:
  redis:
    host: localhost
    password: 123456
  elasticsearch:
    uris: http://192.168.10.167:9200
    username: elastic
    password: 123456

# 开启sentinel feign支持【调用方（调用服务方）的熔断保护、被调用方（服务提供方）的降级保护】
feign:
  sentinel:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
