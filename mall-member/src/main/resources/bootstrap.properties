#服务名
spring.application.name=mall-member
#服务配置中心（最先加载bootstrap.properties文件，避免加载顺序导致null）
spring.cloud.nacos.config.server-addr=127.0.0.1:8848

# 配置sentinel数据传输端口
spring.cloud.sentinel.transport.port=8719
# 配置sentinel数据显示端口
spring.cloud.sentinel.transport.dashboard=127.0.0.1:8080
# 开启feign调用
feign.sentinel.enabled=true
# 暴露所有的endpoints
management.endpoints.web.exposure.include=*

#只加载当前命名空间下的配置文件
spring.cloud.nacos.config.namespace=75588ad3-9d85-4dfb-a3ac-efd4b382c0b0
#redis配置
spring.cloud.nacos.config.ext-config[0].data-id=redis.yml
spring.cloud.nacos.config.ext-config[0].group=local
spring.cloud.nacos.config.ext-config[0].refresh=true
#数据源配置
spring.cloud.nacos.config.ext-config[1].data-id=datasource.yml
spring.cloud.nacos.config.ext-config[1].group=local
spring.cloud.nacos.config.ext-config[1].refresh=true
#mybatis配置
spring.cloud.nacos.config.ext-config[2].data-id=mybatis.yml
spring.cloud.nacos.config.ext-config[2].group=local
spring.cloud.nacos.config.ext-config[2].refresh=true
#其他配置
spring.cloud.nacos.config.ext-config[3].data-id=other.yml
spring.cloud.nacos.config.ext-config[3].group=local
spring.cloud.nacos.config.ext-config[3].refresh=true