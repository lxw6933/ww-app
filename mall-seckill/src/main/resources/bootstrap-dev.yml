server:
  port: 9999  #服务端口号
  servlet:
    context-path: /mall-seckill
spring:
  redis:
    host: localhost
    password: 123456
  data:
    mongodb:
      host: localhost:27017
      database: ww_mall
      username: admin
      password: admin
      authentication-database: admin
  rabbitmq:
    addresses: localhost:5672
    virtual-host: /
    # 设置发送端到exchange确认回调
    publisher-confirm-type: correlated
    # 设置发送端到queue确认回调
    publisher-returns: true
    # 设置消息抵达queue，以异步方式回调 publisher-returns
    template:
      mandatory: true

# 开启sentinel feign支持【调用方（调用服务方）的熔断保护、被调用方（服务提供方）的降级保护】
feign:
  sentinel:
    enabled: true
